version: '3.8'
services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
